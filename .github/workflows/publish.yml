name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  publish-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Bump version (dry run, no git tag)
        run: |
          if ${{ contains(github.event.pull_request.labels.*.name, 'major') }}; then
            npm version major --no-git-tag-version
          elif ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}; then
            npm version minor --no-git-tag-version
          elif ${{ contains(github.event.pull_request.labels.*.name, 'patch') }}; then
            npm version patch --no-git-tag-version
          else
            echo "No version bump label (major/minor/patch) found -- publish would be skipped."
            exit 0
          fi

      - name: Publish dry run
        run: npm publish --dry-run
      

  publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Check version not already published
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSIONS=$(npm view offser versions --json 2>/dev/null || echo "[]")
          if echo "$PUBLISHED_VERSIONS" | grep -q "\"$CURRENT_VERSION\""; then
            echo "Error: Version $CURRENT_VERSION already published to npm. Please bump the version before publishing."
            exit 1
          fi
          echo "Version $CURRENT_VERSION is new. Proceeding with publish."

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
