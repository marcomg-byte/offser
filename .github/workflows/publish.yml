name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

jobs:
  publish-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Bump version (dry run, no git tag)
        run: |
          if ${{ contains(github.event.pull_request.labels.*.name, 'major') }}; then
            npm version major --no-git-tag-version
          elif ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}; then
            npm version minor --no-git-tag-version
          elif ${{ contains(github.event.pull_request.labels.*.name, 'patch') }}; then
            npm version patch --no-git-tag-version
          else
            echo "No version bump label (major/minor/patch) found -- skipping version bump."
          fi

      - name: Publish dry run
        run: npm publish --dry-run

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci
      
      - name: Bump version
        run: |
          if ${{ contains(github.event.head_commit.message, 'major') }}; then
            npm version major
          elif ${{ contains(github.event.head_commit.message, 'minor') }}; then
            npm version minor
          elif ${{ contains(github.event.head_commit.message, 'patch') }}; then
            npm version patch
          else
            echo "No version bump keyword (major/minor/patch) found in commit message -- skipping version bump."
          fi

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
