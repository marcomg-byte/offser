name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  publish-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Bump version (dry run, no git tag)
        run: |
          if ${{ contains(github.event.pull_request.labels.*.name, 'major') }}; then
            npm version major --no-git-tag-version
          elif ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}; then
            npm version minor --no-git-tag-version
          elif ${{ contains(github.event.pull_request.labels.*.name, 'patch') }}; then
            npm version patch --no-git-tag-version
          else
            echo "No version bump label (major/minor/patch) found -- skipping version bump."
          fi

      - name: Publish dry run
        run: npm publish --dry-run

  publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        run: |
          if ${{ contains(github.event.pull_request.labels.*.name, 'major') }}; then
            npm version major
          elif ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}; then
            npm version minor
          else
            npm version patch
          fi

      - name: Push tag
        run: git push origin "$(git describe --abbrev=0 --tags)"

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
