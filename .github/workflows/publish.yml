name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

jobs:
  publish-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Bump version (dry run, no git tag)
        id: bump-version
        run: |
          if ${{ contains(github.event.pull_request.labels.*.name, 'major') }}; then
            npm version major --no-git-tag-version
          elif ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}; then
            npm version minor --no-git-tag-version
          elif ${{ contains(github.event.pull_request.labels.*.name, 'patch') }}; then
            npm version patch --no-git-tag-version
          else
            echo "No version bump label (major/minor/patch) found -- publish would be skipped."
            exit 0
          fi

      - name: Publish dry run
        run: npm publish --dry-run
      

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Compare with published versions
        run: |
          function compare_versions() {
            local current=${1#v};
            local new=${2#v};
            local major_current=$(echo "$current" | cut -d. -f1)
            local minor_current=$(echo "$current" | cut -d. -f2)
            local patch_current=$(echo "$current" | cut -d. -f3)
            local major_new=$(echo "$new" | cut -d. -f1)
            local minor_new=$(echo "$new" | cut -d. -f2)
            local patch_new=$(echo "$new" | cut -d. -f3)

            if [ "$major_new" -gt "$major_current" ]; then
              echo "major"
            elif [ "$minor_new" -gt "$minor_current" ]; then
              echo "minor"
            elif [ "$patch_new" -gt "$patch_current" ]; then
              echo "patch"
            else
              echo "none"
            fi
          }

          NEW_VERSION="${GITHUB_REF#refs/tags/v}"
          LATEST_PUBLISHED=$(npm view offser version 2>/dev/null || echo "0.0.0")
          PUBLISHED_VERSIONS=$(npm view offser versions --json 2>/dev/null || echo "[]")
          HAS_BEEN_PUBLISHED=false

          if echo "$PUBLISHED_VERSIONS" | jq -e --arg v "$NEW_VERSION" 'contains([$v])' > /dev/null; then
            HAS_BEEN_PUBLISHED=true
          fi

          if [ "$HAS_BEEN_PUBLISHED" = true ]; then
            echo "Version $NEW_VERSION has already been published."
            echo "Generating new version by incrementing..."
            TARGETED_BUMP=$(compare_versions "$LATEST_PUBLISHED" "$NEW_VERSION")
            if [ "$TARGETED_BUMP" = "major" ]; then
              npm version major --no-git-tag-version;
            elif [ "$TARGETED_BUMP" = "minor" ]; then
              npm version minor --no-git-tag-version;
            elif [ "$TARGETED_BUMP" = "patch" ]; then
              npm version patch --no-git-tag-version;
            else
              echo "Error: version $NEW_VERSION is already published and no bump type could be determined."
              exit 1
            fi
          fi

          FINAL_VERSION=$(node -p "require('./package.json').version")
          echo "Version $FINAL_VERSION determined. Proceeding with publish."

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}