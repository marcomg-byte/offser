name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref_type }}" == "tag" ]; then
            # If triggered by tag push, use the existing tag version
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix
            npm version $VERSION --no-git-tag-version --allow-same-version
          else
            # If workflow_dispatch, create new version and tag
            if ${{ contains(github.event.pull_request.labels.*.name, 'major') }}; then
              npm version major
            elif ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}; then
              npm version minor
            else
              npm version patch
            fi
          fi

      - name: Push tag
        if: github.event_name == 'workflow_dispatch'
        run: git push origin "$(git describe --abbrev=0 --tags)"

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
