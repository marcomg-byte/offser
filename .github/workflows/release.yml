name: Release

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-check:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump type (dry run)
        id: version_type
        run: |
          if ${{ contains(github.event.pull_request.labels.*.name, 'major') }}; then
            echo "type=major"
          elif ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}; then
            echo "type=minor"
          elif ${{ contains(github.event.pull_request.labels.*.name, 'patch') }}; then
            echo "type=patch"
          else
            echo "No version bump label (major/minor/patch) found -- release would be skipped."
            exit 0
          fi

      - name: Compute next version (dry run)
        run: |
          current=$(node -p "require('./package.json').version")
          current="${current%%-*}"
          current="${current%%+*}"
          IFS='.' read -r major minor patch <<< "$current"
          if ${{ contains(github.event.pull_request.labels.*.name, 'major') }}; then
            next="$((major + 1)).0.0"
          elif ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}; then
            next="${major}.$((minor + 1)).0"
          elif ${{ contains(github.event.pull_request.labels.*.name, 'patch') }}; then
            next="${major}.${minor}.$((patch + 1)}"
          else
            echo "No bump label -- next version unchanged: ${current}"
            exit 0
          fi
          git fetch --tags
          if git rev-parse --verify "v${next}" 2>/dev/null; then
            echo "Tag v${next} already exists -- release would be skipped."
          else
            echo "Release dry run: would bump version to v${next} and create a GitHub Release."
          fi

  release:
    if: >
      github.event.pull_request.merged == true &&
      (
        contains(github.event.pull_request.labels.*.name, 'patch') ||
        contains(github.event.pull_request.labels.*.name, 'minor') ||
        contains(github.event.pull_request.labels.*.name, 'major')
      )
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

      - name: Determine version bump type
        id: version_type
        run: |
          if ${{ contains(github.event.pull_request.labels.*.name, 'major') }}; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Check if next tag already exists
        id: check_tag
        run: |
          current=$(node -p "require('./package.json').version")
          # Strip pre-release/build metadata suffixes (e.g. 1.2.3-alpha or 1.2.3+build)
          current="${current%%-*}"
          current="${current%%+*}"
          IFS='.' read -r major minor patch <<< "$current"
          type="${{ steps.version_type.outputs.type }}"
          if [ "$type" = "major" ]; then
            next="$((major + 1)).0.0"
          elif [ "$type" = "minor" ]; then
            next="${major}.$((minor + 1)).0"
          else
            next="${major}.${minor}.$((patch + 1)}"
          fi
          echo "next_tag=v${next}" >> $GITHUB_OUTPUT
          git fetch --tags
          if git rev-parse --verify "v${next}" 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${next} already exists -- skipping bump and release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version and create tag
        id: bump
        if: steps.check_tag.outputs.exists != 'true'
        run: |
          # Bump version in package.json
          npm version ${{ steps.version_type.outputs.type }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          
          # Commit the version change
          git add package.json package-lock.json
          git commit -m "ci: version bump to v${NEW_VERSION}"
          
          # Create and push tag
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
          
          echo "newTag=v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.newTag }}
          generate_release_notes: true

      - name: Add "released" label to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr edit ${{ github.event.pull_request.number }} --add-label "released"