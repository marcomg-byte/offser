name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set release type
        id: set_release_type
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | jq -e 'contains(["major"])' > /dev/null; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | jq -e 'contains(["minor"])' > /dev/null; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | jq -e 'contains(["patch"])' > /dev/null; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=none" >> $GITHUB_OUTPUT
          fi

      - name: Exit if no release label
        if: steps.set_release_type.outputs.type == 'none'
        run: exit 0

      - name: Bump version and tag
        id: bump-version
        uses: phips28/gh-action-bump-version@v11.0.2
        with:
          tag-prefix: "v"
          version-type: ${{ steps.set_release_type.outputs.type }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump-version.outputs.newTag }}

      - name: Add released label to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['released']
            })